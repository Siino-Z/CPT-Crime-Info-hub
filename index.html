<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Data Cleaner and Aggregator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .processing-section {
            margin-bottom: 30px;
            padding: 25px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
        }
        
        .processing-section h2 {
            color: #2c3e50;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .status.processing {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.complete {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .data-preview {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            max-height: 400px;
            overflow: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .summary-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .summary-card h3 {
            margin-top: 0;
            font-size: 1.2em;
        }
        
        .summary-card .value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }
        
        .trend-indicator {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .trend-up {
            background: #ffebee;
            color: #c62828;
        }
        
        .trend-down {
            background: #e8f5e8;
            color: #2e7d32;
        }
        
        .trend-stable {
            background: #fff3e0;
            color: #ef6c00;
        }
        
        .export-buttons {
            margin-top: 20px;
            text-align: center;
            gap: 10px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚔 Crime Data Cleaner & Aggregator</h1>
        
        <div class="processing-section">
            <h2>📊 Data Processing Status <span id="overall-status" class="status processing">Processing...</span></h2>
            <div id="processing-log"></div>
        </div>
        
        <div class="processing-section">
            <h2>📈 Crime Summary Statistics</h2>
            <div id="summary-stats" class="summary-grid"></div>
        </div>
        
        <div class="processing-section">
            <h2>🏢 Station Performance Analysis</h2>
            <div id="station-analysis"></div>
        </div>
        
        <div class="processing-section">
            <h2>🔍 Crime Type Trends</h2>
            <div id="crime-trends"></div>
        </div>
        
        <div class="processing-section">
            <h2>🗺️ Geographic Distribution</h2>
            <div id="geographic-data"></div>
        </div>
        
        <div class="processing-section">
            <h2>📋 Unified Dataset Preview</h2>
            <div id="unified-dataset"></div>
        </div>
        
        <div class="export-buttons">
            <button class="btn btn-primary" onclick="exportUnifiedDataset()">📥 Export Unified Dataset (CSV)</button>
            <button class="btn btn-primary" onclick="exportUnifiedDataset('json')">📥 Export Unified Dataset (JSON)</button>
            <button class="btn btn-primary" onclick="exportSummaryReport()">📋 Export Summary Report</button>
        </div>
    </div>

    <script>
        let cleanedData = {
            stations: [],
            crimeTypes: [],
            coordinates: [],
            unifiedDataset: [],
            summary: {},
            trends: {}
        };

        async function processData() {
            try {
                updateStatus('Loading and parsing CSV files...', 'processing');
                
                // Read and parse the CSV files
                const stationData = await parseCSV('crimecounts-by-station.csv');
                const crimeTypeData = await parseCSV('crimecounts-by-type.csv');
                const coordinateData = await parseCSV('stations_coordinates.csv');
                
                updateStatus('Cleaning and standardizing data...', 'processing');
                
                // Clean the data
                cleanedData.stations = cleanStationData(stationData);
                cleanedData.crimeTypes = cleanCrimeTypeData(crimeTypeData);
                cleanedData.coordinates = cleanCoordinateData(coordinateData);
                
                updateStatus('Generating analytics and insights...', 'processing');
                
                // Generate aggregated insights
                generateSummaryStats();
                createUnifiedDataset();
                analyzeStationPerformance();
                analyzeCrimeTrends();
                analyzeGeographicDistribution();
                
                updateStatus('Data processing complete!', 'complete');
                
            } catch (error) {
                console.error('Error processing data:', error);
                updateStatus('Error processing data: ' + error.message, 'error');
            }
        }

        async function parseCSV(filename) {
            try {
                // Check if window.fs is available
                if (typeof window.fs === 'undefined' || !window.fs.readFile) {
                    // Use embedded data if file system is not available
                    return getEmbeddedData(filename);
                }
                
                const csvData = await window.fs.readFile(filename, { encoding: 'utf8' });
                return Papa.parse(csvData, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    delimitersToGuess: [',', '\t', '|', ';']
                }).data;
            } catch (error) {
                // Fallback to embedded data
                return getEmbeddedData(filename);
            }
        }

        function cleanStationData(data) {
            return data.map(row => {
                // Clean headers by removing whitespace and normalizing
                const cleanRow = {};
                Object.keys(row).forEach(key => {
                    const cleanKey = key.trim().replace(/\s+/g, ' ');
                    cleanRow[cleanKey] = typeof row[key] === 'string' ? row[key].trim() : row[key];
                });
                
                return {
                    provPosition: cleanRow['Prov Position'] || 0,
                    rsaPosition: cleanRow['RSA Position'] || 0,
                    station: cleanRow['Station'] || '',
                    district: cleanRow['District'] || '',
                    province: cleanRow['Province'] || '',
                    jan2021Mar2021: parseInt(cleanRow['January 2021 to March 2021']) || 0,
                    jan2022Mar2022: parseInt(cleanRow['January 2022 to March 2022']) || 0,
                    jan2023Mar2023: parseInt(cleanRow['January 2023 to March 2023']) || 0,
                    jan2024Mar2024: parseInt(cleanRow['January 2024 to March 2024']) || 0,
                    jan2025Mar2025: parseInt(cleanRow['January 2025 to March 2025']) || 0,
                    countDiff: parseInt(cleanRow['Count Diff']) || 0,
                    percentChange: parseFloat(cleanRow['(%) Change']) || 0
                };
            }).filter(row => row.station && row.station !== '');
        }

        function cleanCrimeTypeData(data) {
            return data.map(row => {
                const cleanRow = {};
                Object.keys(row).forEach(key => {
                    const cleanKey = key.trim().replace(/\s+/g, ' ');
                    cleanRow[cleanKey] = typeof row[key] === 'string' ? row[key].trim() : row[key];
                });
                
                return {
                    crimeCategory: cleanRow['CRIME CATEGORY'] || '',
                    jan2021Mar2021: parseInt(cleanRow['January 2021 to March 2021']) || 0,
                    jan2022Mar2022: parseInt(cleanRow['January 2022 to March 2022']) || 0,
                    jan2023Mar2023: parseInt(cleanRow['January 2023 to March 2023']) || 0,
                    jan2024Mar2024: parseInt(cleanRow['January 2024 to March 2024']) || 0,
                    jan2025Mar2025: parseInt(cleanRow['January 2025 to March 2025']) || 0,
                    countDiff: parseInt(cleanRow['Count Diff']) || 0,
                    percentChange: parseFloat(cleanRow['(%) Change']) || 0
                };
            }).filter(row => row.crimeCategory && row.crimeCategory !== '' && !isNaN(row.jan2025Mar2025));
        }

        function cleanCoordinateData(data) {
            return data.map(row => ({
                station: (row['Station'] || '').trim(),
                latitude: parseFloat(row['Latitude']) || 0,
                longitude: parseFloat(row['Longitude']) || 0
            })).filter(row => row.station && row.latitude !== 0 && row.longitude !== 0);
        }

        function generateSummaryStats() {
            const totalStations = cleanedData.stations.length;
            const totalCrimeTypes = cleanedData.crimeTypes.length;
            
            // Calculate total crimes for latest period
            const totalCrimes2025 = cleanedData.stations.reduce((sum, station) => sum + station.jan2025Mar2025, 0);
            const totalCrimes2024 = cleanedData.stations.reduce((sum, station) => sum + station.jan2024Mar2024, 0);
            
            const overallChange = totalCrimes2024 > 0 ? ((totalCrimes2025 - totalCrimes2024) / totalCrimes2024 * 100) : 0;
            
            // Find stations with biggest increases/decreases
            const stationChanges = cleanedData.stations
                .filter(s => s.countDiff !== 0)
                .sort((a, b) => Math.abs(b.countDiff) - Math.abs(a.countDiff));
            
            cleanedData.summary = {
                totalStations,
                totalCrimeTypes,
                totalCrimes2025,
                totalCrimes2024,
                overallChange,
                biggestIncrease: stationChanges.find(s => s.countDiff > 0),
                biggestDecrease: stationChanges.find(s => s.countDiff < 0)
            };
            
            displaySummaryStats();
        }

        function displaySummaryStats() {
            const container = document.getElementById('summary-stats');
            const summary = cleanedData.summary;
            
            container.innerHTML = `
                <div class="summary-card">
                    <h3>Total Stations</h3>
                    <div class="value">${summary.totalStations}</div>
                </div>
                <div class="summary-card">
                    <h3>Crime Types</h3>
                    <div class="value">${summary.totalCrimeTypes}</div>
                </div>
                <div class="summary-card">
                    <h3>Total Crimes (2025)</h3>
                    <div class="value">${summary.totalCrimes2025.toLocaleString()}</div>
                </div>
                <div class="summary-card">
                    <h3>Overall Change</h3>
                    <div class="value">${summary.overallChange.toFixed(1)}%</div>
                    <span class="trend-indicator ${summary.overallChange > 0 ? 'trend-up' : summary.overallChange < 0 ? 'trend-down' : 'trend-stable'}">
                        ${summary.overallChange > 0 ? '↗️ Increase' : summary.overallChange < 0 ? '↘️ Decrease' : '➡️ Stable'}
                    </span>
                </div>
            `;
        }

        function analyzeStationPerformance() {
            const topPerforming = cleanedData.stations
                .filter(s => s.countDiff < 0)
                .sort((a, b) => a.countDiff - b.countDiff)
                .slice(0, 10);
            
            const worstPerforming = cleanedData.stations
                .filter(s => s.countDiff > 0)
                .sort((a, b) => b.countDiff - a.countDiff)
                .slice(0, 10);
            
            displayStationAnalysis(topPerforming, worstPerforming);
        }

                                <td>${station.jan2025Mar2025}</td>
                                <td class="trend-up">+${station.countDiff}</td>
                                <td class="trend-up">+${(station.percentChange * 100).toFixed(1)}%</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function analyzeCrimeTrends() {
            const majorCrimes = cleanedData.crimeTypes.filter(crime => 
                ['Murder', 'Sexual offences', 'Assault with the intent to inflict grievous bodily harm', 
                 'Common assault', 'Robbery with aggravating circumstances', 'Burglary at residential premises'].includes(crime.crimeCategory)
            );
            
            displayCrimeTrends(majorCrimes);
        }

        function displayCrimeTrends(crimes) {
            const container = document.getElementById('crime-trends');
            
            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Crime Type</th>
                            <th>2021 Q1</th>
                            <th>2022 Q1</th>
                            <th>2023 Q1</th>
                            <th>2024 Q1</th>
                            <th>2025 Q1</th>
                            <th>Trend</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${crimes.map(crime => {
                            const trend = crime.percentChange > 0.05 ? 'trend-up' : crime.percentChange < -0.05 ? 'trend-down' : 'trend-stable';
                            const trendText = crime.percentChange > 0.05 ? '↗️ Rising' : crime.percentChange < -0.05 ? '↘️ Declining' : '➡️ Stable';
                            
                            return `
                                <tr>
                                    <td><strong>${crime.crimeCategory}</strong></td>
                                    <td>${crime.jan2021Mar2021}</td>
                                    <td>${crime.jan2022Mar2022}</td>
                                    <td>${crime.jan2023Mar2023}</td>
                                    <td>${crime.jan2024Mar2024}</td>
                                    <td>${crime.jan2025Mar2025}</td>
                                    <td><span class="trend-indicator ${trend}">${trendText}</span></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        function analyzeGeographicDistribution() {
            // Merge station data with coordinates
            const stationsWithCoords = cleanedData.stations.map(station => {
                const coords = cleanedData.coordinates.find(c => c.station === station.station);
                return {
                    ...station,
                    latitude: coords ? coords.latitude : null,
                    longitude: coords ? coords.longitude : null
                };
            }).filter(s => s.latitude && s.longitude);
            
            displayGeographicData(stationsWithCoords);
        }

        function createUnifiedDataset() {
            // Create a comprehensive unified dataset
            cleanedData.unifiedDataset = cleanedData.stations.map(station => {
                // Find corresponding coordinates
                const coords = cleanedData.coordinates.find(c => c.station === station.station);
                
                // Calculate additional metrics
                const totalCrimes5Year = station.jan2021Mar2021 + station.jan2022Mar2022 + 
                                       station.jan2023Mar2023 + station.jan2024Mar2024 + station.jan2025Mar2025;
                
                const averageCrimesPerYear = totalCrimes5Year / 5;
                
                // Calculate year-over-year changes
                const change2022vs2021 = station.jan2021Mar2021 > 0 ? 
                    ((station.jan2022Mar2022 - station.jan2021Mar2021) / station.jan2021Mar2021 * 100) : 0;
                const change2023vs2022 = station.jan2022Mar2022 > 0 ? 
                    ((station.jan2023Mar2023 - station.jan2022Mar2022) / station.jan2022Mar2022 * 100) : 0;
                const change2024vs2023 = station.jan2023Mar2023 > 0 ? 
                    ((station.jan2024Mar2024 - station.jan2023Mar2023) / station.jan2023Mar2023 * 100) : 0;
                const change2025vs2024 = station.jan2024Mar2024 > 0 ? 
                    ((station.jan2025Mar2025 - station.jan2024Mar2024) / station.jan2024Mar2024 * 100) : 0;
                
                // Determine trend classification
                let trendClassification = 'Stable';
                if (station.percentChange > 0.1) trendClassification = 'Significant Increase';
                else if (station.percentChange > 0.05) trendClassification = 'Moderate Increase';
                else if (station.percentChange < -0.1) trendClassification = 'Significant Decrease';
                else if (station.percentChange < -0.05) trendClassification = 'Moderate Decrease';
                
                // Performance ranking (lower is better for crime reduction)
                const performanceScore = station.percentChange * -1; // Negative change is good
                
                return {
                    // Basic Information
                    station_name: station.station,
                    district: station.district,
                    province: station.province,
                    provincial_ranking: station.provPosition,
                    national_ranking: station.rsaPosition,
                    
                    // Geographic Data
                    latitude: coords ? coords.latitude : null,
                    longitude: coords ? coords.longitude : null,
                    has_coordinates: coords ? 'Yes' : 'No',
                    
                    // Crime Counts by Year (Q1 periods)
                    crimes_2021_q1: station.jan2021Mar2021,
                    crimes_2022_q1: station.jan2022Mar2022,
                    crimes_2023_q1: station.jan2023Mar2023,
                    crimes_2024_q1: station.jan2024Mar2024,
                    crimes_2025_q1: station.jan2025Mar2025,
                    
                    // Calculated Metrics
                    total_crimes_5_years: totalCrimes5Year,
                    average_crimes_per_year: Math.round(averageCrimesPerYear),
                    
                    // Year-over-Year Changes (%)
                    change_2022_vs_2021_pct: Math.round(change2022vs2021 * 10) / 10,
                    change_2023_vs_2022_pct: Math.round(change2023vs2022 * 10) / 10,
                    change_2024_vs_2023_pct: Math.round(change2024vs2023 * 10) / 10,
                    change_2025_vs_2024_pct: Math.round(change2025vs2024 * 10) / 10,
                    
                    // Latest Period Analysis
                    crime_change_2025_vs_2024: station.countDiff,
                    crime_change_2025_vs_2024_pct: Math.round(station.percentChange * 1000) / 10,
                    
                    // Classification and Performance
                    trend_classification: trendClassification,
                    performance_score: Math.round(performanceScore * 1000) / 10,
                    
                    // Status Flags
                    needs_attention: station.countDiff > 50 ? 'High Priority' : 
                                   station.countDiff > 0 ? 'Monitor' : 'Good',
                    improvement_status: station.countDiff < -100 ? 'Excellent Improvement' :
                                      station.countDiff < -50 ? 'Good Improvement' :
                                      station.countDiff < 0 ? 'Some Improvement' :
                                      station.countDiff === 0 ? 'No Change' : 'Deterioration'
                };
            });
            
            // Sort by performance score (best performers first)
            cleanedData.unifiedDataset.sort((a, b) => b.performance_score - a.performance_score);
            
            displayUnifiedDataset();
        }

        function displayUnifiedDataset() {
            const container = document.getElementById('unified-dataset');
            const dataset = cleanedData.unifiedDataset;
            
            container.innerHTML = `
                <p><strong>Unified Dataset Created:</strong> ${dataset.length} stations with complete data integration</p>
                <div class="data-preview">
                    <h4>Sample Records (First 5 stations):</h4>
                    <table style="font-size: 0.8em;">
                        <thead>
                            <tr>
                                <th>Station</th>
                                <th>District</th>
                                <th>Coordinates</th>
                                <th>2025 Q1</th>
                                <th>Change vs 2024</th>
                                <th>Trend</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${dataset.slice(0, 5).map(record => `
                                <tr>
                                    <td><strong>${record.station_name}</strong></td>
                                    <td>${record.district}</td>
                                    <td>${record.has_coordinates === 'Yes' ? `${record.latitude?.toFixed(2)}, ${record.longitude?.toFixed(2)}` : 'No coords'}</td>
                                    <td>${record.crimes_2025_q1}</td>
                                    <td class="${record.crime_change_2025_vs_2024 > 0 ? 'trend-up' : record.crime_change_2025_vs_2024 < 0 ? 'trend-down' : 'trend-stable'}">
                                        ${record.crime_change_2025_vs_2024 > 0 ? '+' : ''}${record.crime_change_2025_vs_2024} (${record.crime_change_2025_vs_2024_pct}%)
                                    </td>
                                    <td>${record.trend_classification}</td>
                                    <td><span class="trend-indicator ${record.needs_attention === 'High Priority' ? 'trend-up' : record.needs_attention === 'Monitor' ? 'trend-stable' : 'trend-down'}">
                                        ${record.needs_attention}
                                    </span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    
                    <h4>Dataset Schema (${Object.keys(dataset[0] || {}).length} columns):</h4>
                    <div style="column-count: 2; column-gap: 20px; margin-top: 10px;">
                        ${dataset.length > 0 ? Object.keys(dataset[0]).map(key => 
                            `<div style="break-inside: avoid; margin-bottom: 5px;"><strong>${key}:</strong> ${typeof dataset[0][key]}</div>`
                        ).join('') : 'No data available'}
                    </div>
                </div>
            `;
        }

        function displayGeographicData(stations) {
            const container = document.getElementById('geographic-data');
            
            container.innerHTML = `
                <p>Stations with geographic coordinates: <strong>${stations.length}</strong></p>
                <table>
                    <thead>
                        <tr>
                            <th>Station</th>
                            <th>Latitude</th>
                            <th>Longitude</th>
                            <th>2025 Q1 Crimes</th>
                            <th>Change from 2024</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${stations.slice(0, 15).map(station => `
                            <tr>
                                <td><strong>${station.station}</strong></td>
                                <td>${station.latitude.toFixed(4)}</td>
                                <td>${station.longitude.toFixed(4)}</td>
                                <td>${station.jan2025Mar2025}</td>
                                <td class="${station.countDiff > 0 ? 'trend-up' : station.countDiff < 0 ? 'trend-down' : 'trend-stable'}">
                                    ${station.countDiff > 0 ? '+' : ''}${station.countDiff}
                                </td>
                            </tr>

        function updateStatus(message, type) {
            const statusElement = document.getElementById('overall-status');
            const logElement = document.getElementById('processing-log');
            
            statusElement.textContent = message;
            statusElement.className = `status ${type}`;
            
            const timestamp = new Date().toLocaleTimeString();
            logElement.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        function exportUnifiedDataset(format = 'csv') {
            const dataset = cleanedData.unifiedDataset;
            const timestamp = new Date().toISOString().slice(0, 10);
            
            if (format === 'csv') {
                // Convert to CSV
                const headers = Object.keys(dataset[0]);
                const csvContent = [
                    headers.join(','),
                    ...dataset.map(row => 
                        headers.map(header => {
                            const value = row[header];
                            // Handle null/undefined values and escape quotes
                            if (value === null || value === undefined) return '';
                            if (typeof value === 'string' && (value.includes(',') || value.includes('"'))) {
                                return `"${value.replace(/"/g, '""')}"`;
                            }
                            return value;
                        }).join(',')
                    )
                ].join('\n');
                
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `unified_crime_dataset_${timestamp}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            } else {
                // Export as JSON
                const dataToExport = {
                    metadata: {
                        title: "Unified Crime Dataset",
                        description: "Comprehensive crime statistics with station data, coordinates, and trend analysis",
                        exportDate: new Date().toISOString(),
                        totalRecords: dataset.length,
                        dataSourceFiles: [
                            "crimecounts-by-station.csv",
                            "crimecounts-by-type.csv", 
                            "stations_coordinates.csv"
                        ],
                        timePeriod: "January-March 2021-2025",
                        columns: Object.keys(dataset[0] || {}),
                        generatedBy: "Crime Data Aggregator"
                    },
                    data: dataset,
                    summary: cleanedData.summary
                };
                
                const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `unified_crime_dataset_${timestamp}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }

        function exportSummaryReport() {
            const report = generateTextReport();
            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'crime_analysis_report.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function generateTextReport() {
            const summary = cleanedData.summary;
            const date = new Date().toLocaleDateString();
            
            return `
CRIME DATA ANALYSIS REPORT
Generated: ${date}

EXECUTIVE SUMMARY
================
Total Police Stations Analyzed: ${summary.totalStations}
Crime Categories Tracked: ${summary.totalCrimeTypes}
Total Crimes (Jan-Mar 2025): ${summary.totalCrimes2025?.toLocaleString() || 'N/A'}
Overall Change from 2024: ${summary.overallChange?.toFixed(1)}%

KEY FINDINGS
============
${summary.biggestDecrease ? `Best Performing Station: ${summary.biggestDecrease.station} (${summary.biggestDecrease.countDiff} crimes reduction)` : 'No significant crime reductions identified'}

${summary.biggestIncrease ? `Station Needing Attention: ${summary.biggestIncrease.station} (+${summary.biggestIncrease.countDiff} crimes increase)` : 'No significant crime increases identified'}

DATA QUALITY NOTES
==================
- All numeric values have been validated and cleaned
- Station names standardized for consistency
- Geographic coordinates available for ${cleanedData.coordinates.length} stations
- Time periods standardized to quarterly reporting (Jan-Mar for each year)

RECOMMENDATIONS
===============

2. Study and replicate best practices from top-performing stations
3. Monitor quarterly trends for early intervention opportunities
4. Enhance geographic analysis using coordinate data for spatial crime patterns

---
Report generated by Crime Data Analyzer
            `.trim();
        }

        // Initialize processing when page loads
        window.addEventListener('load', processData);
    </script>
